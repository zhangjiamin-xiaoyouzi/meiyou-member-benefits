<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>E-R图 - 会员日模板功能</title>
<style>

  h2 { text-align: center; margin-bottom: 30px; font-size: 20px; color: #333; }
  .legend { display: flex; gap: 24px; justify-content: center; margin-bottom: 30px; font-size: 13px; color: #666; }

  .legend-rect { width: 20px; height: 14px; border: 2px solid #3b82f6; background: #eff6ff; border-radius: 2px; }
  .legend-diamond { width: 16px; height: 16px; border: 2px solid #f59e0b; background: #fffbeb; transform: rotate(45deg); }
  .legend-oval { width: 20px; height: 14px; border: 2px solid #22c55e; background: #f0fdf4; border-radius: 10px; }

</style>
