<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>E-R图 - 会员日模板活动管理</title>
<style>
  body { font-family: "PingFang SC","Microsoft YaHei",system-ui,sans-serif; background: #fff; margin: 0; padding: 20px; }
  h2 { text-align: center; color: #333; margin-bottom: 10px; }
  .legend { display: flex; gap: 30px; justify-content: center; margin-bottom: 24px; font-size: 13px; color: #666; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h2>E-R图 - 会员日模板活动管理</h2>
<div class="legend">
  <div class="legend-item"><div style="width:20px;height:14px;border:2px solid #3b82f6;background:#eff6ff;border-radius:2px;"></div> 实体</div>
  <div class="legend-item"><div style="width:14px;height:14px;border:2px solid #f59e0b;background:#fffbeb;transform:rotate(45deg);"></div> 关系</div>
  <div class="legend-item"><div style="width:20px;height:14px;border:2px solid #22c55e;background:#f0fdf4;border-radius:10px;"></div> 属性</div>
  <div class="legend-item"><span style="font-weight:600;color:#64748b;font-size:14px;">1 / N</span> 基数</div>
</div>

<svg width="1000" height="1200" viewBox="0 0 1000 1200">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><polygon points="0 0,6 2,0 4" fill="#94a3b8"/></marker>
  </defs>

  <!-- ============ 第1层：活动模板 y=60 ============ -->
  <!-- 实体: 活动模板 -->
  <rect x="400" y="40" width="180" height="40" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="490" y="66" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">活动模板</text>
  <!-- 属性 -->
  <ellipse cx="230" cy="30" rx="52" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="230" y="35" text-anchor="middle" font-size="11" fill="#166534">模板ID</text>
  <line x1="282" y1="30" x2="400" y2="52" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="230" cy="65" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="230" y="70" text-anchor="middle" font-size="11" fill="#166534">模板名称</text>
  <line x1="285" y1="65" x2="400" y2="60" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="230" cy="100" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="230" y="105" text-anchor="middle" font-size="11" fill="#166534">模板分类</text>
  <line x1="285" y1="100" x2="400" y2="68" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="750" cy="45" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="750" y="50" text-anchor="middle" font-size="11" fill="#166534">描述</text>
  <line x1="695" y1="45" x2="580" y2="55" stroke="#94a3b8" stroke-width="1"/>

  <!-- ============ 关系: 包含 y=150 ============ -->
  <polygon points="490,135 535,160 490,185 445,160" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="490" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">包含</text>
  <line x1="490" y1="80" x2="490" y2="135" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="500" y="105" font-size="12" fill="#64748b" font-weight="600">1</text>
  <line x1="490" y1="185" x2="490" y2="240" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="500" y="218" font-size="12" fill="#64748b" font-weight="600">N</text>

  <!-- ============ 第2层：模板组件 y=280 ============ -->
  <rect x="400" y="240" width="180" height="40" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="490" y="266" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">模板组件</text>
  <!-- 属性 -->
  <ellipse cx="230" cy="240" rx="52" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="230" y="245" text-anchor="middle" font-size="11" fill="#166534">组件ID</text>
  <line x1="282" y1="240" x2="400" y2="255" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="230" cy="275" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="230" y="280" text-anchor="middle" font-size="11" fill="#166534">组件名称</text>
  <line x1="285" y1="275" x2="400" y2="264" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="750" cy="250" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="750" y="255" text-anchor="middle" font-size="11" fill="#166534">组件标识</text>
  <line x1="695" y1="250" x2="580" y2="258" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="750" cy="285" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="750" y="290" text-anchor="middle" font-size="11" fill="#166534">是否必选</text>
  <line x1="695" y1="285" x2="580" y2="270" stroke="#94a3b8" stroke-width="1"/>

  <!-- ============ 关系: 基于 y=370 ============ -->

  <line x1="270" y1="355" x2="400" y2="280" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="345" y="310" font-size="12" fill="#64748b" font-weight="600">1</text>
  <line x1="270" y1="405" x2="270" y2="460" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="280" y="438" font-size="12" fill="#64748b" font-weight="600">N</text>

  <!-- ============ 第3层：活动 y=500 ============ -->
  <rect x="180" y="460" width="180" height="40" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="270" y="486" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">活动</text>
  <!-- 属性 -->
  <ellipse cx="50" cy="430" rx="52" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="50" y="435" text-anchor="middle" font-size="11" fill="#166534">活动ID</text>
  <line x1="102" y1="430" x2="180" y2="470" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="50" cy="465" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="50" y="470" text-anchor="middle" font-size="11" fill="#166534">活动名称</text>
  <line x1="105" y1="465" x2="180" y2="475" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="50" cy="500" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="50" y="505" text-anchor="middle" font-size="11" fill="#166534">活动分类</text>
  <line x1="105" y1="500" x2="180" y2="485" stroke="#94a3b8" stroke-width="1"/>

  <line x1="105" y1="570" x2="180" y2="495" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="50" cy="605" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="50" y="610" text-anchor="middle" font-size="11" fill="#166534">组件开关</text>
  <line x1="105" y1="605" x2="180" y2="498" stroke="#94a3b8" stroke-width="1"/>

  <!-- ============ 关系: 配置 y=590 ============ -->

  <text x="395" y="530" font-size="12" fill="#64748b" font-weight="600">1</text>
  <line x1="535" y1="595" x2="620" y2="595" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="575" y="588" font-size="12" fill="#64748b" font-weight="600">N</text>

  <!-- ============ 第4层：组件配置 y=600 ============ -->
  <rect x="620" y="575" width="180" height="40" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="710" y="601" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">组件配置</text>
  <!-- 属性 -->
  <ellipse cx="890" cy="580" rx="65" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="890" y="585" text-anchor="middle" font-size="11" fill="#166534">所属组件标识</text>
  <line x1="825" y1="580" x2="800" y2="590" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="890" cy="615" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="890" y="620" text-anchor="middle" font-size="11" fill="#166534">配置内容</text>

  <line x1="270" y1="500" x2="270" y2="700" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="280" y="600" font-size="12" fill="#64748b" font-weight="600">1</text>
  <line x1="270" y1="750" x2="270" y2="800" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="280" y="780" font-size="12" fill="#64748b" font-weight="600">N</text>

  <!-- ============ 第5层：客群分组 y=840 ============ -->
  <rect x="180" y="800" width="180" height="40" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="270" y="826" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">客群分组</text>
  <!-- 属性 -->
  <ellipse cx="80" cy="810" rx="48" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="80" y="815" text-anchor="middle" font-size="11" fill="#166534">分组ID</text>
  <line x1="128" y1="810" x2="180" y2="818" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="80" cy="845" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="80" y="850" text-anchor="middle" font-size="11" fill="#166534">分组名称</text>
  <line x1="135" y1="845" x2="180" y2="830" stroke="#94a3b8" stroke-width="1"/>

  <!-- ============ 关系: 筛选 y=920 ============ -->

  <line x1="485" y1="925" x2="570" y2="925" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="525" y="918" font-size="12" fill="#64748b" font-weight="600">N</text>

  <!-- ============ 第6层a：受众规则 y=920 ============ -->
  <rect x="570" y="905" width="180" height="40" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="660" y="931" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">受众规则</text>
  <!-- 属性 -->
  <ellipse cx="830" cy="885" rx="48" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="830" y="890" text-anchor="middle" font-size="11" fill="#166534">规则ID</text>
  <line x1="778" y1="885" x2="750" y2="915" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="830" cy="920" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="830" y="925" text-anchor="middle" font-size="11" fill="#166534">筛选字段</text>
  <line x1="775" y1="920" x2="750" y2="925" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="830" cy="955" rx="48" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="830" y="960" text-anchor="middle" font-size="11" fill="#166534">运算符</text>
  <line x1="782" y1="955" x2="750" y2="938" stroke="#94a3b8" stroke-width="1"/>
  <ellipse cx="830" cy="990" rx="48" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="830" y="995" text-anchor="middle" font-size="11" fill="#166534">规则值</text>
  <line x1="782" y1="990" x2="750" y2="942" stroke="#94a3b8" stroke-width="1"/>

  <!-- ============ 关系: 展示 y=920 ============ -->

  <!-- ============ 第6层b：货架商品 y=960 ============ -->

  <text x="490" y="976" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">货架商品</text>

  <ellipse cx="400" cy="1040" rx="48" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="400" y="1045" text-anchor="middle" font-size="11" fill="#166534">商品ID</text>

  <ellipse cx="500" cy="1040" rx="55" ry="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/><text x="500" y="1045" text-anchor="middle" font-size="11" fill="#166534">是否主推</text>
  <line x1="490" y1="1025" x2="490" y2="990" stroke="#94a3b8" stroke-width="1"/>

</body>
