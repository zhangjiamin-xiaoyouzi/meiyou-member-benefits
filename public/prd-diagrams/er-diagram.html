<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>E-R图 - 会员日活动管理系统</title>
<style>
  body { font-family: "PingFang SC","Microsoft YaHei",system-ui,sans-serif; background:#fff; margin:0; padding:20px; display:flex; justify-content:center; }
  svg { max-width:100%; height:auto; }
  .entity { fill:#eff6ff; stroke:#3b82f6; stroke-width:2; rx:4; }
  .entity-text { font-size:13px; font-weight:600; fill:#1e40af; text-anchor:middle; dominant-baseline:central; }
  .relation { fill:#fffbeb; stroke:#f59e0b; stroke-width:1.5; }
  .relation-text { font-size:11px; font-weight:600; fill:#92400e; text-anchor:middle; dominant-baseline:central; }
  .attr { fill:#f0fdf4; stroke:#22c55e; stroke-width:1.5; }
  .attr-text { font-size:10px; fill:#166534; text-anchor:middle; dominant-baseline:central; }
  .pk-attr { fill:#fef9c3; stroke:#eab308; stroke-width:1.5; }
  .pk-text { font-size:10px; fill:#854d0e; text-anchor:middle; dominant-baseline:central; font-weight:600; }
  .link { stroke:#94a3b8; stroke-width:1; fill:none; }
  .main-link { stroke:#94a3b8; stroke-width:1.5; fill:none; }
  .card { font-size:10px; fill:#64748b; font-weight:700; }
</style>
</head>
<body>
<svg width="820" height="720" viewBox="0 0 820 720">
  <!-- 图例 -->
  <rect x="10" y="5" width="14" height="10" rx="2" class="entity"/><text x="28" y="13" font-size="10" fill="#666" dominant-baseline="central">实体</text>
  <polygon points="85,10 93,5 101,10 93,15" class="relation"/><text x="107" y="13" font-size="10" fill="#666" dominant-baseline="central">关系</text>
  <ellipse cx="165" cy="10" rx="10" ry="7" class="attr"/><text x="180" y="13" font-size="10" fill="#666" dominant-baseline="central">属性</text>
  <ellipse cx="225" cy="10" rx="10" ry="7" class="pk-attr"/><text x="240" y="13" font-size="10" fill="#666" dominant-baseline="central">主键</text>
  <text x="285" y="13" font-size="10" fill="#666" dominant-baseline="central" font-weight="700">1/N</text><text x="305" y="13" font-size="10" fill="#666" dominant-baseline="central">基数</text>

  <!-- ========== 第1层：活动模板 y=50 ========== -->
  <rect x="340" y="45" width="130" height="32" class="entity"/>
  <text x="405" y="61" class="entity-text">活动模板</text>
  <!-- 属性 -->
  <ellipse cx="210" cy="45" rx="38" ry="13" class="pk-attr"/><text x="210" y="45" class="pk-text">模板ID</text>
  <line x1="248" y1="45" x2="340" y2="55" class="link"/>
  <ellipse cx="210" cy="75" rx="42" ry="13" class="attr"/><text x="210" y="75" class="attr-text">模板名称</text>
  <line x1="252" y1="72" x2="340" y2="62" class="link"/>
  <ellipse cx="600" cy="45" rx="42" ry="13" class="attr"/><text x="600" y="45" class="attr-text">模板分类</text>
  <line x1="558" y1="45" x2="470" y2="55" class="link"/>
  <ellipse cx="600" cy="75" rx="28" ry="13" class="attr"/><text x="600" y="75" class="attr-text">描述</text>
  <line x1="572" y1="72" x2="470" y2="62" class="link"/>

  <!-- 关系：包含 y=105 -->
  <polygon points="405,98 425,110 405,122 385,110" class="relation"/>
  <text x="405" y="110" class="relation-text">包含</text>
  <line x1="405" y1="77" x2="405" y2="98" class="main-link"/>
  <text x="412" y="88" class="card">1</text>
  <line x1="405" y1="122" x2="405" y2="148" class="main-link"/>
  <text x="412" y="138" class="card">N</text>

  <!-- ========== 第2层：模板组件 y=150 ========== -->
  <rect x="340" y="148" width="130" height="32" class="entity"/>
  <text x="405" y="164" class="entity-text">模板组件</text>
  <ellipse cx="210" cy="148" rx="38" ry="13" class="pk-attr"/><text x="210" y="148" class="pk-text">组件ID</text>
  <line x1="248" y1="150" x2="340" y2="158" class="link"/>
  <ellipse cx="210" cy="178" rx="42" ry="13" class="attr"/><text x="210" y="178" class="attr-text">组件名称</text>
  <line x1="252" y1="175" x2="340" y2="168" class="link"/>
  <ellipse cx="600" cy="155" rx="42" ry="13" class="attr"/><text x="600" y="155" class="attr-text">组件标识</text>
  <line x1="558" y1="155" x2="470" y2="160" class="link"/>
  <ellipse cx="600" cy="185" rx="42" ry="13" class="attr"/><text x="600" y="185" class="attr-text">是否必选</text>
  <line x1="558" y1="182" x2="470" y2="170" class="link"/>

  <!-- 关系：基于 y=215 -->
  <polygon points="250,215 270,228 250,241 230,228" class="relation"/>
  <text x="250" y="228" class="relation-text">基于</text>
  <line x1="265" y1="220" x2="340" y2="180" class="main-link"/>
  <text x="300" y="200" class="card">1</text>
  <line x1="255" y1="241" x2="255" y2="270" class="main-link"/>
  <text x="262" y="260" class="card">N</text>

  <!-- ========== 第3层：活动 y=275 ========== -->
  <rect x="185" y="270" width="130" height="32" class="entity"/>
  <text x="250" y="286" class="entity-text">活动</text>
  <!-- 属性（左侧纵向排列） -->
  <ellipse cx="72" cy="260" rx="38" ry="13" class="pk-attr"/><text x="72" y="260" class="pk-text">活动ID</text>
  <line x1="110" y1="262" x2="185" y2="278" class="link"/>
  <ellipse cx="72" cy="290" rx="42" ry="13" class="attr"/><text x="72" y="290" class="attr-text">活动名称</text>
  <line x1="114" y1="288" x2="185" y2="286" class="link"/>
  <ellipse cx="72" cy="320" rx="42" ry="13" class="attr"/><text x="72" y="320" class="attr-text">活动分类</text>
  <line x1="114" y1="315" x2="185" y2="295" class="link"/>
  <ellipse cx="72" cy="350" rx="28" ry="13" class="attr"/><text x="72" y="350" class="attr-text">状态</text>
  <line x1="100" y1="345" x2="185" y2="300" class="link"/>
  <ellipse cx="72" cy="380" rx="42" ry="13" class="attr"/><text x="72" y="380" class="attr-text">时间配置</text>
  <line x1="114" y1="372" x2="190" y2="302" class="link"/>
  <ellipse cx="72" cy="410" rx="42" ry="13" class="attr"/><text x="72" y="410" class="attr-text">组件开关</text>
  <line x1="114" y1="402" x2="195" y2="302" class="link"/>

  <!-- 关系：配置 y=310 → 组件配置 -->
  <polygon points="520,290 540,305 520,320 500,305" class="relation"/>
  <text x="520" y="305" class="relation-text">配置</text>
  <line x1="315" y1="288" x2="500" y2="303" class="main-link"/>
  <text x="405" y="292" class="card">1</text>
  <line x1="540" y1="305" x2="610" y2="305" class="main-link"/>
  <text x="575" y="298" class="card">N</text>

  <!-- ========== 第3层右：组件配置 y=290 ========== -->
  <rect x="610" y="290" width="130" height="32" class="entity"/>
  <text x="675" y="306" class="entity-text">组件配置</text>
  <ellipse cx="770" cy="285" rx="52" ry="13" class="attr"/><text x="770" y="285" class="attr-text">所属组件标识</text>
  <line x1="720" y1="288" x2="740" y2="298" class="link"/>
  <ellipse cx="770" cy="318" rx="42" ry="13" class="attr"/><text x="770" y="318" class="attr-text">配置内容</text>
  <line x1="728" y1="316" x2="740" y2="310" class="link"/>

  <!-- 关系：划分 y=440 → 客群分组 -->
  <polygon points="250,440 270,455 250,470 230,455" class="relation"/>
  <text x="250" y="455" class="relation-text">划分</text>
  <line x1="250" y1="302" x2="250" y2="440" class="main-link"/>
  <text x="258" y="375" class="card">1</text>
  <line x1="258" y1="470" x2="258" y2="500" class="main-link"/>
  <text x="265" y="490" class="card">N</text>

  <!-- ========== 第4层左：客群分组 y=505 ========== -->
  <rect x="185" y="500" width="130" height="32" class="entity"/>
  <text x="250" y="516" class="entity-text">客群分组</text>
  <ellipse cx="72" cy="495" rx="38" ry="13" class="pk-attr"/><text x="72" y="495" class="pk-text">分组ID</text>
  <line x1="110" y1="497" x2="185" y2="512" class="link"/>
  <ellipse cx="72" cy="530" rx="42" ry="13" class="attr"/><text x="72" y="530" class="attr-text">分组名称</text>
  <line x1="114" y1="527" x2="185" y2="520" class="link"/>

  <!-- 关系：筛选 y=550 → 受众规则 -->
  <polygon points="470,515 490,530 470,545 450,530" class="relation"/>
  <text x="470" y="530" class="relation-text">筛选</text>
  <line x1="315" y1="518" x2="450" y2="528" class="main-link"/>
  <text x="380" y="520" class="card">1</text>
  <line x1="490" y1="530" x2="555" y2="530" class="main-link"/>
  <text x="522" y="523" class="card">N</text>

  <!-- 关系：展示 y=565 → 货架商品 -->
  <polygon points="250,565 270,580 250,595 230,580" class="relation"/>
  <text x="250" y="580" class="relation-text">展示</text>
  <line x1="250" y1="532" x2="250" y2="565" class="main-link"/>
  <text x="258" y="550" class="card">1</text>
  <line x1="270" y1="582" x2="370" y2="605" class="main-link"/>
  <text x="320" y="595" class="card">N</text>

  <!-- ========== 第4层中：受众规则 y=515 ========== -->
  <rect x="555" y="515" width="130" height="32" class="entity"/>
  <text x="620" y="531" class="entity-text">受众规则</text>
  <ellipse cx="740" cy="510" rx="38" ry="13" class="pk-attr"/><text x="740" y="510" class="pk-text">规则ID</text>
  <line x1="702" y1="514" x2="685" y2="522" class="link"/>
  <ellipse cx="740" cy="540" rx="42" ry="13" class="attr"/><text x="740" y="540" class="attr-text">筛选字段</text>
  <line x1="698" y1="538" x2="685" y2="535" class="link"/>
  <ellipse cx="740" cy="570" rx="36" ry="13" class="attr"/><text x="740" y="570" class="attr-text">运算符</text>
  <line x1="704" y1="564" x2="685" y2="545" class="link"/>
  <ellipse cx="740" cy="600" rx="36" ry="13" class="attr"/><text x="740" y="600" class="attr-text">规则值</text>
  <line x1="704" y1="594" x2="685" y2="548" class="link"/>

  <!-- ========== 第5层：货架商品 y=605 ========== -->
  <rect x="370" y="600" width="130" height="32" class="entity"/>
  <text x="435" y="616" class="entity-text">货架商品</text>
  <ellipse cx="370" cy="655" rx="38" ry="13" class="pk-attr"/><text x="370" y="655" class="pk-text">商品ID</text>
  <line x1="385" y1="644" x2="400" y2="632" class="link"/>
  <ellipse cx="435" cy="660" rx="42" ry="13" class="attr"/><text x="435" y="660" class="attr-text">是否主推</text>
  <line x1="435" y1="647" x2="435" y2="632" class="link"/>
  <ellipse cx="505" cy="655" rx="28" ry="13" class="attr"/><text x="505" y="655" class="attr-text">排序</text>
  <line x1="480" y1="647" x2="470" y2="632" class="link"/>

  <!-- 底部留白充足，无裁切 -->
</svg>
</body>
</html>
